<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>🔮 Табачка-Фидбек</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-glow sphere-1"></div>
    <div class="bg-glow sphere-2"></div>
    <div class="bg-glow sphere-3"></div>

    <div id="particleCanvasContainer"></div>

    <div class="container">
      <div class="form-card" id="formCard">
        <div class="header-zone">
          <h2 id="mainTitle">🔮 Табачка-Фидбек</h2>
          <p class="subtitle">
            Полная анонимность гарантирована.
            <span class="admin-note">(наёбываёт сам admin)</span>
          </p>
        </div>

        <div class="theme-section">
          <label class="section-label">Атмосфера пространства:</label>
          <div class="theme-picker">
            <button
              type="button"
              class="theme-dot"
              data-theme="neon"
              style="background: linear-gradient(135deg, #a855f7, #f43f5e)"
              title="Кибер Неон"
            ></button>
            <button
              type="button"
              class="theme-dot active"
              data-theme="amber"
              style="background: linear-gradient(135deg, #ff7e5f, #feb47b)"
              title="Закат"
            ></button>
            <button
              type="button"
              class="theme-dot"
              data-theme="emerald"
              style="background: linear-gradient(135deg, #059669, #34d399)"
              title="Матрица"
            ></button>
            <button
              type="button"
              class="theme-dot"
              data-theme="ocean"
              style="background: linear-gradient(135deg, #1e40af, #38bdf8)"
              title="Глубокий Океан"
            ></button>
          </div>
        </div>

        <div class="category-section">
          <label class="section-label">Категория обращения:</label>
          <div class="category-group">
            <button
              type="button"
              class="category-btn active"
              data-category="💬 Критика и придирки"
            >
              <span class="btn-icon">💬</span> Чатик, вайбово
            </button>
            <button
              type="button"
              class="category-btn"
              data-category="💡 Гениальная мысль"
            >
              <span class="btn-icon">💡</span> Инсайт (0.067%)
            </button>
            <button
              type="button"
              class="category-btn"
              data-category="☕️ Поболтать за жизнь"
            >
              <span class="btn-icon">☕️</span> хочется что-нибудь
            </button>
            <button
              type="button"
              class="category-btn"
              data-category="🐈 Поток чистой шизы"
            >
              <span class="btn-icon">🐈</span> Кот (он милый)
            </button>
          </div>
        </div>

        <form id="complaintForm" novalidate>
          <div class="input-group">
            <label for="username">Ник, можно рандомный (Необязательно)</label>
            <div class="input-wrapper" id="diceWrapper">
              <input
                type="text"
                id="username"
                placeholder="Имя, ник или секретный код..."
                autocomplete="off"
                maxlength="40"
              />
              <button type="button" id="randomNickBtn" title="Бросить кубик">
                🎲
              </button>
            </div>
          </div>

          <div class="input-group" style="position: relative">
            <label for="complaintText">Текст сообщения *</label>

            <div class="spy-bot" id="spyBot">
              <div class="bot-antenna"></div>
              <div class="bot-head">
                <div class="bot-eye left-eye"><div class="pupil"></div></div>
                <div class="bot-eye right-eye"><div class="pupil"></div></div>
              </div>
              <div class="bot-mouth"></div>
            </div>

            <textarea
              id="complaintText"
              required
              placeholder="Напиши что-нибудь интересное..."
              rows="5"
              maxlength="1000"
            ></textarea>

            <div class="progress-bar-container">
              <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>

            <div class="char-counter">
              <span id="charCount">0</span>/1000 симв.
            </div>
          </div>

          <button type="submit" id="submitBtn">
            <span class="btn-text">Отправить</span>
            <div class="spinner hidden"></div>
          </button>
        </form>
      </div>
    </div>

    <div id="successModal" class="modal hidden">
      <div class="modal-content">
        <div class="success-icon">✨</div>
        <h3>Успешно доставлено!</h3>
        <p id="memeFact">Ваше сообщение отправлено.</p>
        <div class="meme-container">
          <img id="memeImage" src="" alt="Мем фидбека" />
        </div>
        <button id="closeModalBtn">Вернуться в реальность</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
