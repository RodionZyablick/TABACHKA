<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>🔮 Табачка-Фидбек</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-glow sphere-1"></div>
    <div class="bg-glow sphere-2"></div>
    <div class="bg-glow sphere-3"></div>
    <div id="particleCanvasContainer"></div>

    <div class="container">
      <div class="form-card" id="formCard">
        <div class="header-zone">
          <h2 id="mainTitle">🔮 Табачка-Фидбек</h2>
          <p class="subtitle">
            Ваша анонимность под надежной защитой.
            <span class="admin-note">(администрация проекта)</span>
          </p>
        </div>

        <div class="category-section">
          <div class="category-group">
            <button
              type="button"
              class="category-btn active"
              data-category="💬 Свободное общение"
            >
              <span class="btn-icon">💬</span> Чатик
            </button>
            <button
              type="button"
              class="category-btn"
              data-category="✨ Пожелания и идеи"
            >
              <span class="btn-icon">✨</span> Пожелания
            </button>
            <button
              type="button"
              class="category-btn"
              data-category="🤝 Предложение о встрече"
            >
              <span class="btn-icon">🤝</span> Встречи
            </button>
            <button
              type="button"
              class="category-btn"
              data-category="💌 Анонимное послание"
            >
              <span class="btn-icon">💌</span> Тайное письмо
            </button>
          </div>
        </div>

        <form id="complaintForm" novalidate>
          <div class="input-group">
            <label for="username">Ваш ник</label>
            <input
              type="text"
              id="username"
              placeholder="Представьтесь"
              maxlength="40"
            />
          </div>

          <div class="input-group" id="recipientGroup" style="display: none">
            <label for="recipientUser">Кому отправить:</label>
            <input type="text" id="recipientUser" placeholder="@username" />
          </div>

          <div class="input-group">
            <label for="complaintText">Текст сообщения *</label>
            <textarea
              id="complaintText"
              required
              placeholder="Напишите что-нибудь..."
              rows="5"
              maxlength="1000"
            ></textarea>
          </div>

          <div
            class="media-controls"
            style="display: flex; gap: 10px; margin-bottom: 20px"
          >
            <input
              type="file"
              id="fileInput"
              accept="image/*"
              style="display: none"
            />
            <button
              type="button"
              onclick="document.getElementById('fileInput').click()"
            >
              🖼 Фото
            </button>
            <button type="button" id="recordBtn" style="background: #ef4444">
              🎙 Голос
            </button>
          </div>

          <button type="submit" id="submitBtn">
            <span class="btn-text">Отправить</span>
          </button>
        </form>
      </div>
    </div>

    <div id="successModal" class="modal hidden">
      <div class="modal-content">
        <div class="success-icon">✨</div>
        <h3>Успешно доставлено!</h3>
        <button id="closeModalBtn">Вернуться</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
